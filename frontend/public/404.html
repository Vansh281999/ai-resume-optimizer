<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Career OS - AI Career Intelligence</title>
  </head>
  <body>
    <script>
      const repoPath = '/ai-resume-optimizer';
      let routePath = window.location.pathname.startsWith(repoPath)
        ? window.location.pathname.slice(repoPath.length)
        : window.location.pathname;
      while (routePath.startsWith(repoPath)) {
        routePath = routePath.slice(repoPath.length);
      }
      const safeRoute = routePath.startsWith('/') ? routePath : '/' + routePath;
      const existingHash = window.location.hash ? window.location.hash.replace(/^#/, '') : '';
      window.location.replace(repoPath + '/#' + safeRoute + existingHash + window.location.search);
    </script>
  </body>
</html>
